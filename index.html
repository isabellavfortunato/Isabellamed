<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sua rotina completa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --roxo:#480A80;
    --lilas:#886AE9;
    --laranja:#FE7443;
    --azul:#02B3C6;
    --rosa:#FE31BC;
    --fundo:#F7F4FC;
    --tinta-med:rgba(136,106,233,0.12);
    --borda-med:rgba(72,10,128,0.16);
    --texto-suave:#9C97B0;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:
      radial-gradient(1200px 500px at 80% -10%, rgba(254,116,67,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(2,179,198,0.10), transparent 60%),
      var(--fundo);
    color:#2b2540;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:32px 18px 56px;
    line-height:1.45;
  }

  .day{width:100%;max-width:520px;}

  header{margin-bottom:22px;}

  .eyebrow{
    font-size:12px;font-weight:600;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--lilas);margin-bottom:8px;
  }
  h1{font-size:26px;font-weight:700;color:var(--roxo);letter-spacing:-0.01em;}
  .data{margin-top:6px;font-size:14px;font-weight:500;color:var(--laranja);text-transform:capitalize;}

  .legenda{
    display:flex;gap:18px;flex-wrap:wrap;margin-top:16px;
    font-size:12.5px;color:#6b6680;
  }
  .legenda span{display:flex;align-items:center;gap:8px;}
  .dot-cheia{width:13px;height:13px;border-radius:50%;background:linear-gradient(145deg,var(--roxo),var(--lilas));}
  .dot-vazia{width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid #d7d1e6;}

  .progresso{
    margin-top:18px;display:flex;align-items:center;justify-content:space-between;
    gap:12px;background:#fff;border:1px solid #ece7f6;border-radius:14px;
    padding:12px 15px;box-shadow:0 6px 18px rgba(72,10,128,0.05);
  }
  .progresso .texto{font-size:13.5px;font-weight:500;color:var(--roxo);}
  .progresso button{
    border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;
    color:var(--lilas);background:rgba(136,106,233,0.12);
    padding:7px 13px;border-radius:999px;transition:background .15s;
  }
  .progresso button:hover{background:rgba(136,106,233,0.22);}

  .timeline{position:relative;list-style:none;margin-top:26px;padding-left:34px;}
  .timeline::before{
    content:"";position:absolute;left:11px;top:6px;bottom:6px;width:3px;border-radius:3px;
    background:linear-gradient(to bottom,var(--laranja) 0%,var(--rosa) 30%,var(--lilas) 55%,var(--roxo) 78%,var(--azul) 100%);
    opacity:0.55;
  }

  .entry{position:relative;margin-bottom:14px;}

  .node{position:absolute;left:-29px;top:18px;width:18px;height:18px;border-radius:50%;z-index:1;}
  .med .node{background:linear-gradient(145deg,var(--roxo),var(--lilas));box-shadow:0 0 0 4px var(--fundo),0 4px 10px rgba(72,10,128,0.35);}
  .leve .node{background:#fff;border:3px solid #d7d1e6;box-shadow:0 0 0 4px var(--fundo);}

  .card{
    border-radius:16px;padding:14px 16px;display:flex;align-items:flex-start;gap:13px;
    width:100%;text-align:left;
  }
  label.card{cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .med .card{background:var(--tinta-med);border:1px solid var(--borda-med);}
  .leve .card{background:rgba(72,10,128,0.035);border:1px dashed rgba(72,10,128,0.14);}

  .chk{position:absolute;opacity:0;pointer-events:none;}
  .box{
    flex:0 0 auto;width:22px;height:22px;border-radius:7px;margin-top:1px;
    border:2px solid var(--lilas);background:#fff;position:relative;transition:all .15s;
  }
  .leve .box{border-color:#c9c2de;}
  .box::after{
    content:"";position:absolute;left:6px;top:2px;width:6px;height:11px;
    border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg) scale(0);
    transition:transform .15s;
  }
  .chk:checked + .box{background:linear-gradient(145deg,var(--roxo),var(--lilas));border-color:var(--roxo);}
  .leve .chk:checked + .box{background:linear-gradient(145deg,var(--azul),var(--lilas));border-color:var(--azul);}
  .chk:checked + .box::after{transform:rotate(45deg) scale(1);}
  .chk:focus-visible + .box{outline:3px solid rgba(136,106,233,0.5);outline-offset:2px;}

  .hora{
    flex:0 0 auto;font-size:13px;font-weight:600;padding:6px 11px;border-radius:999px;
    white-space:nowrap;line-height:1.1;margin-top:1px;
  }
  .med .hora{background:linear-gradient(135deg,var(--roxo),var(--lilas));color:#fff;}
  .leve .hora{background:transparent;color:var(--texto-suave);border:1px solid #ddd7ea;}

  .conteudo{padding-top:2px;}
  .item{font-size:15.5px;font-weight:600;color:#2b2540;transition:opacity .15s;}
  .leve .item{font-weight:500;color:var(--texto-suave);}
  .nota{margin-top:3px;font-size:12.5px;font-weight:400;color:#7c7791;}

  .entry.feito .item{opacity:.45;text-decoration:line-through;}
  .entry.feito .nota{opacity:.5;}

  .marcador .card{padding-left:16px;}

  footer{margin-top:30px;font-size:11.5px;color:var(--texto-suave);text-align:center;}

  @media print{
    body{background:#fff;}
    .timeline::before{opacity:1;}
    .progresso button{display:none;}
  }
</style>
</head>
<body>
  <main class="day">
    <header>
      <div class="eyebrow">rotina do dia</div>
      <h1>Sua rotina completa</h1>
      <p class="data" id="dataHoje"></p>
      <div class="legenda">
        <span><i class="dot-cheia"></i>medicação</span>
        <span><i class="dot-vazia"></i>suplemento e descanso</span>
      </div>
      <div class="progresso">
        <span class="texto" id="contador">0 de 6 itens concluídos</span>
        <button id="limpar" type="button">limpar dia</button>
      </div>
    </header>

    <ol class="timeline" id="lista">

      <li class="entry leve" data-id="suplemento">
        <span class="node"></span>
        <label class="card">
          <input type="checkbox" class="chk">
          <span class="box"></span>
          <span class="hora">8:00 às 9:00</span>
          <span class="conteudo">
            <span class="item">Guaraná, maca peruana e ginseng</span>
            <span class="nota">em iogurte, ajuda a combater o sono diurno</span>
          </span>
        </label>
      </li>

      <li class="entry med" data-id="lurasidona">
        <span class="node"></span>
        <label class="card">
          <input type="checkbox" class="chk">
          <span class="box"></span>
          <span class="hora">12:00</span>
          <span class="conteudo">
            <span class="item">Lurasidona 40 mg</span>
            <span class="nota">com o almoço</span>
          </span>
        </label>
      </li>

      <li class="entry med" data-id="lamitor">
        <span class="node"></span>
        <label class="card">
          <input type="checkbox" class="chk">
          <span class="box"></span>
          <span class="hora">18:00</span>
          <span class="conteudo">
            <span class="item">Lamitor 200 mg</span>
          </span>
        </label>
      </li>

      <li class="entry med" data-id="litio-20">
        <span class="node"></span>
        <label class="card">
          <input type="checkbox" class="chk">
          <span class="box"></span>
          <span class="hora">20:00</span>
          <span class="conteudo">
            <span class="item">Lítio 450 mg</span>
          </span>
        </label>
      </li>

      <li class="entry med" data-id="quetiapina">
        <span class="node"></span>
        <label class="card">
          <input type="checkbox" class="chk">
          <span class="box"></span>
          <span class="hora">21:00</span>
          <span class="conteudo">
            <span class="item">Quetiapina XR 50 mg e Alprazolam</span>
            <span class="nota">alprazolam só se necessário</span>
          </span>
        </label>
      </li>

      <li class="entry leve marcador" data-id="dormir-marcador">
        <span class="node"></span>
        <div class="card">
          <span class="hora">22:00</span>
          <span class="conteudo">
            <span class="item">Dormir</span>
          </span>
        </div>
      </li>

      <li class="entry med" data-id="litio-23">
        <span class="node"></span>
        <label class="card">
          <input type="checkbox" class="chk">
          <span class="box"></span>
          <span class="hora">23:00</span>
          <span class="conteudo">
            <span class="item">Lítio 450 mg</span>
            <span class="nota">segunda metade</span>
          </span>
        </label>
      </li>

      <li class="entry leve marcador" data-id="acordar-marcador">
        <span class="node"></span>
        <div class="card">
          <span class="hora">6:00 às 7:00</span>
          <span class="conteudo">
            <span class="item">Acordar</span>
          </span>
        </div>
      </li>

    </ol>

    <footer>organizado com carinho para a sua rotina diária</footer>
  </main>

<script>
(function(){
  // Data do dia, sempre atualizada ao abrir
  var hoje = new Date();
  var iso = hoje.getFullYear() + "-" +
            String(hoje.getMonth()+1).padStart(2,"0") + "-" +
            String(hoje.getDate()).padStart(2,"0");
  document.getElementById("dataHoje").textContent =
    hoje.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  var chave = "rotina-" + iso;
  var entradas = Array.prototype.slice.call(document.querySelectorAll(".entry[data-id] .chk"));
  var total = entradas.length;
  var contador = document.getElementById("contador");

  function ler(){
    try{ return JSON.parse(localStorage.getItem(chave)) || {}; }
    catch(e){ return {}; }
  }
  function salvar(estado){
    try{ localStorage.setItem(chave, JSON.stringify(estado)); }catch(e){}
  }
  function atualizarContador(){
    var feitos = entradas.filter(function(c){return c.checked;}).length;
    contador.textContent = feitos + " de " + total + " itens concluídos";
  }
  function marcarLinha(chk){
    chk.closest(".entry").classList.toggle("feito", chk.checked);
  }

  var estado = ler();
  entradas.forEach(function(chk){
    var id = chk.closest(".entry").getAttribute("data-id");
    chk.checked = !!estado[id];
    marcarLinha(chk);
    chk.addEventListener("change", function(){
      var e = ler();
      e[id] = chk.checked;
      salvar(e);
      marcarLinha(chk);
      atualizarContador();
    });
  });
  atualizarContador();

  document.getElementById("limpar").addEventListener("click", function(){
    entradas.forEach(function(chk){ chk.checked = false; marcarLinha(chk); });
    salvar({});
    atualizarContador();
  });
})();
</script>
</body>
</html>
