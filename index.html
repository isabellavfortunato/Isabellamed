<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#480A80">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Sua rotina completa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --roxo:#480A80;
    --lilas:#886AE9;
    --laranja:#FE7443;
    --azul:#02B3C6;
    --rosa:#FE31BC;
    --fundo:#F7F4FC;
    --tinta-med:rgba(136,106,233,0.12);
    --borda-med:rgba(72,10,128,0.16);
    --texto-suave:#9C97B0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:
      radial-gradient(1200px 500px at 80% -10%, rgba(254,116,67,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(2,179,198,0.10), transparent 60%),
      var(--fundo);
    color:#2b2540;min-height:100vh;display:flex;justify-content:center;
    padding:32px 18px 56px;line-height:1.45;
  }
  .day{width:100%;max-width:520px;}
  header{margin-bottom:18px;}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--lilas);margin-bottom:8px;}
  h1{font-size:26px;font-weight:700;color:var(--roxo);letter-spacing:-0.01em;}
  .data{margin-top:6px;font-size:14px;font-weight:500;color:var(--laranja);text-transform:capitalize;}

  .tabs{display:flex;gap:6px;background:#fff;border:1px solid #ece7f6;border-radius:999px;padding:5px;margin-top:18px;box-shadow:0 6px 18px rgba(72,10,128,0.05);}
  .tab{flex:1;text-align:center;padding:9px;border-radius:999px;font-weight:600;font-size:13.5px;color:var(--texto-suave);cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .15s;}
  .tab.ativo{background:linear-gradient(135deg,var(--roxo),var(--lilas));color:#fff;}

  .legenda{display:flex;gap:18px;flex-wrap:wrap;margin-top:18px;font-size:12.5px;color:#6b6680;}
  .legenda span{display:flex;align-items:center;gap:8px;}
  .dot-cheia{width:13px;height:13px;border-radius:50%;background:linear-gradient(145deg,var(--roxo),var(--lilas));}
  .dot-vazia{width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid #d7d1e6;}

  .barra{margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid #ece7f6;border-radius:14px;padding:12px 15px;box-shadow:0 6px 18px rgba(72,10,128,0.05);}
  .barra .texto{font-size:13.5px;font-weight:500;color:var(--roxo);}
  .barra button{border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--lilas);background:rgba(136,106,233,0.12);padding:7px 13px;border-radius:999px;transition:background .15s;}
  .barra button:hover{background:rgba(136,106,233,0.22);}

  .editando{margin-top:12px;font-size:13px;color:#6b6680;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .editando b{color:var(--roxo);text-transform:capitalize;font-weight:600;}
  .editando button{border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--laranja);background:rgba(254,116,67,0.12);padding:5px 11px;border-radius:999px;}

  .timeline{position:relative;list-style:none;margin-top:22px;padding-left:34px;}
  .timeline::before{content:"";position:absolute;left:11px;top:6px;bottom:6px;width:3px;border-radius:3px;background:linear-gradient(to bottom,var(--laranja) 0%,var(--rosa) 30%,var(--lilas) 55%,var(--roxo) 78%,var(--azul) 100%);opacity:0.55;}
  .entry{position:relative;margin-bottom:14px;}
  .node{position:absolute;left:-29px;top:18px;width:18px;height:18px;border-radius:50%;z-index:1;}
  .med .node{background:linear-gradient(145deg,var(--roxo),var(--lilas));box-shadow:0 0 0 4px var(--fundo),0 4px 10px rgba(72,10,128,0.35);}
  .leve .node{background:#fff;border:3px solid #d7d1e6;box-shadow:0 0 0 4px var(--fundo);}
  .card{border-radius:16px;padding:14px 16px;display:flex;align-items:flex-start;gap:13px;width:100%;text-align:left;}
  label.card{cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .med .card{background:var(--tinta-med);border:1px solid var(--borda-med);}
  .leve .card{background:rgba(72,10,128,0.035);border:1px dashed rgba(72,10,128,0.14);}
  .chk{position:absolute;opacity:0;pointer-events:none;}
  .box{flex:0 0 auto;width:22px;height:22px;border-radius:7px;margin-top:1px;border:2px solid var(--lilas);background:#fff;position:relative;transition:all .15s;}
  .leve .box{border-color:#c9c2de;}
  .box::after{content:"";position:absolute;left:6px;top:2px;width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg) scale(0);transition:transform .15s;}
  .chk:checked + .box{background:linear-gradient(145deg,var(--roxo),var(--lilas));border-color:var(--roxo);}
  .leve .chk:checked + .box{background:linear-gradient(145deg,var(--azul),var(--lilas));border-color:var(--azul);}
  .chk:checked + .box::after{transform:rotate(45deg) scale(1);}
  .chk:focus-visible + .box{outline:3px solid rgba(136,106,233,0.5);outline-offset:2px;}
  .hora{flex:0 0 auto;font-size:13px;font-weight:600;padding:6px 11px;border-radius:999px;white-space:nowrap;line-height:1.1;margin-top:1px;}
  .med .hora{background:linear-gradient(135deg,var(--roxo),var(--lilas));color:#fff;}
  .leve .hora{background:transparent;color:var(--texto-suave);border:1px solid #ddd7ea;}
  .conteudo{padding-top:2px;}
  .item{font-size:15.5px;font-weight:600;color:#2b2540;transition:opacity .15s;}
  .leve .item{font-weight:500;color:var(--texto-suave);}
  .nota{margin-top:3px;font-size:12.5px;font-weight:400;color:#7c7791;}
  .entry.feito .item{opacity:.45;text-decoration:line-through;}
  .entry.feito .nota{opacity:.5;}
  .marcador .card{padding-left:16px;}

  /* mês */
  #viewMes{margin-top:22px;}
  .cal-topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-titulo{font-size:17px;font-weight:600;color:var(--roxo);text-transform:capitalize;}
  .cal-nav{display:flex;gap:8px;}
  .cal-nav button{width:36px;height:36px;border-radius:10px;border:1px solid #ece7f6;background:#fff;color:var(--roxo);font-size:18px;cursor:pointer;font-family:inherit;line-height:1;}
  .cal-nav button:hover{background:#f1ecfb;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{font-size:11px;text-align:center;color:var(--texto-suave);font-weight:600;text-transform:capitalize;padding-bottom:2px;}
  .cal-cell{aspect-ratio:1/1;border-radius:12px;border:1px solid #ece7f6;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#2b2540;cursor:pointer;background:#fff;}
  .cal-cell .frac{font-size:9.5px;font-weight:500;color:var(--texto-suave);margin-top:1px;}
  .cal-cell.cheio{color:#fff;}
  .cal-cell.cheio .frac{color:rgba(255,255,255,0.85);}
  .cal-cell.hoje{box-shadow:0 0 0 2px var(--laranja);}
  .cal-vazio{background:transparent;border:none;cursor:default;}
  .cal-resumo{margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid #ece7f6;border-radius:14px;padding:12px 15px;box-shadow:0 6px 18px rgba(72,10,128,0.05);}
  .cal-resumo .texto{font-size:13.5px;font-weight:500;color:var(--roxo);}
  .cal-resumo button{border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--laranja),var(--rosa));padding:8px 14px;border-radius:999px;}
  .escondido{display:none !important;}

  /* login */
  .overlay{position:fixed;inset:0;background:var(--fundo);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50;}
  .login{width:100%;max-width:360px;background:#fff;border:1px solid #ece7f6;border-radius:20px;padding:26px 24px;box-shadow:0 18px 50px rgba(72,10,128,0.12);}
  .login h2{font-size:21px;font-weight:700;color:var(--roxo);margin-bottom:4px;}
  .login p{font-size:13px;color:var(--texto-suave);margin-bottom:18px;line-height:1.4;}
  .login label{display:block;font-size:12.5px;font-weight:600;color:#6b6680;margin-bottom:6px;}
  .login input{width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1px solid #ddd7ea;border-radius:12px;margin-bottom:14px;color:#2b2540;}
  .login input:focus{outline:none;border-color:var(--lilas);box-shadow:0 0 0 3px rgba(136,106,233,0.2);}
  .login button{width:100%;border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--roxo),var(--lilas));padding:13px;border-radius:12px;}
  .login button:disabled{opacity:.6;cursor:default;}
  .login .erro{font-size:12.5px;color:#c0392b;margin-bottom:12px;min-height:16px;}
  .sair{margin-top:18px;text-align:center;}
  .sair button{border:none;background:none;cursor:pointer;font-family:inherit;font-size:12px;color:var(--texto-suave);text-decoration:underline;}

  /* comemoração */
  #confete{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:60;}
  .parabens{position:fixed;left:50%;top:36%;transform:translate(-50%,-50%) scale(.8);z-index:61;background:#fff;border:1px solid #ece7f6;border-radius:22px;padding:26px 34px;text-align:center;box-shadow:0 24px 70px rgba(72,10,128,0.28);opacity:0;pointer-events:none;transition:opacity .3s ease, transform .3s ease;}
  .parabens.mostra{opacity:1;transform:translate(-50%,-50%) scale(1);}
  .parabens h3{font-size:27px;font-weight:700;background:linear-gradient(135deg,var(--roxo),var(--rosa));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px;}
  .parabens p{font-size:14px;color:#6b6680;}

  footer{margin-top:30px;font-size:11.5px;color:var(--texto-suave);text-align:center;}
  @media print{body{background:#fff;}.timeline::before{opacity:1;}.barra button,.cal-resumo button,.cal-nav{display:none;}}
</style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="login">
      <h2>Entrar</h2>
      <p id="loginMsg">Use o seu email e senha para acessar a sua rotina.</p>
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="username" inputmode="email">
      <label for="senha">Senha</label>
      <input type="password" id="senha" autocomplete="current-password">
      <div class="erro" id="loginErro"></div>
      <button id="entrar" type="button">Entrar</button>
    </div>
  </div>
  <canvas id="confete"></canvas>
  <div class="parabens" id="parabens">
    <h3>Parabéns</h3>
    <p>Você concluiu a sua rotina de hoje</p>
  </div>
  <main class="day">
    <header>
      <div class="eyebrow">rotina do dia</div>
      <h1>Sua rotina completa</h1>
      <p class="data" id="dataHoje"></p>
      <div class="tabs">
        <button class="tab ativo" id="tabHoje" type="button">Dia</button>
        <button class="tab" id="tabMes" type="button">Mês</button>
      </div>
    </header>

    <!-- VISÃO DO DIA -->
    <section id="viewHoje">
      <div class="legenda">
        <span><i class="dot-cheia"></i>medicação</span>
        <span><i class="dot-vazia"></i>suplemento</span>
      </div>
      <div class="barra">
        <span class="texto" id="contador">0 de 7 itens concluídos</span>
        <button id="limparDia" type="button">limpar dia</button>
      </div>
      <div class="editando" id="editando"></div>

      <ol class="timeline" id="lista">
        <li class="entry leve" data-id="suplemento">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">9:00</span>
            <span class="conteudo">
              <span class="item">Guaraná em pó</span>
            </span>
          </label>
        </li>
        <li class="entry med" data-id="alprazolam-tarde">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">16:30</span>
            <span class="conteudo">
              <span class="item">Alprazolam 0,5 mg</span>
            </span>
          </label>
        </li>
        <li class="entry med" data-id="lamitor">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">18:00</span>
            <span class="conteudo">
              <span class="item">Lamitor 200 mg</span>
            </span>
          </label>
        </li>
        <li class="entry med" data-id="lurasidona">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">18:00</span>
            <span class="conteudo">
              <span class="item">Lurasidona 40 mg</span>
            </span>
          </label>
        </li>
        <li class="entry med" data-id="litio-20">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">19:00</span>
            <span class="conteudo">
              <span class="item">Lítio 900 mg</span>
            </span>
          </label>
        </li>
        <li class="entry med" data-id="quetiapina">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">19:00</span>
            <span class="conteudo">
              <span class="item">Quetiapina XR 50 mg</span>
            </span>
          </label>
        </li>
        <li class="entry med" data-id="alprazolam-noite">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">20:00</span>
            <span class="conteudo">
              <span class="item">Alprazolam 1 mg</span>
            </span>
          </label>
        </li>
      </ol>
    </section>

    <!-- VISÃO DO MÊS -->
    <section id="viewMes" class="escondido">
      <div class="cal-topo">
        <span class="cal-titulo" id="calTitulo"></span>
        <div class="cal-nav">
          <button id="mesAnterior" type="button" aria-label="mês anterior">‹</button>
          <button id="mesProximo" type="button" aria-label="próximo mês">›</button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-resumo">
        <span class="texto" id="calResumo">0 dias completos</span>
        <button id="limparMes" type="button">limpar mês</button>
      </div>
    </section>

    <div class="sair"><button id="sair" type="button">sair desta conta</button></div>
    <footer>organizado com carinho para a sua rotina diária</footer>
  </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, setPersistence, browserLocalPersistence, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { initializeFirestore, persistentLocalCache, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

// ============================================================
// COLE AQUI a configuracao do seu projeto Firebase.
// No console do Firebase: Configuracoes do projeto, seu app web, firebaseConfig.
const firebaseConfig = {
  apiKey: "AIzaSyA7bDVe9YOp4W1FXb3lf6hnCV7vOgvXP8E",
  authDomain: "isabella-meds.firebaseapp.com",
  projectId: "isabella-meds",
  storageBucket: "isabella-meds.firebasestorage.app",
  messagingSenderId: "652402708275",
  appId: "1:652402708275:web:cd3baf8aa13d412de2f846"
};
// ============================================================

const TICK = ["suplemento","alprazolam-tarde","lamitor","litio-20","quetiapina","lurasidona","alprazolam-noite"];
const TOTAL = TICK.length;
const MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const DOW = ["dom","seg","ter","qua","qui","sex","sáb"];

const pad = n => String(n).padStart(2,"0");
const iso = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const parseIso = s => { const p=s.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); };
const porExtenso = d => d.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

const hoje = new Date(); hoje.setHours(0,0,0,0);
const hojeIso = iso(hoje);
let selecionado = new Date(hoje);
let mesView = { y:hoje.getFullYear(), m:hoje.getMonth() };
let estado = { dias:{} };
let docRef = null;

const readDay = s => estado.dias[s] || {};
const doneCount = s => { const o=readDay(s); let n=0; TICK.forEach(id=>{ if(o[id]) n++; }); return n; };

document.getElementById("dataHoje").textContent = porExtenso(hoje);

const mapa = [];
document.querySelectorAll(".entry[data-id]").forEach(li=>{
  const chk = li.querySelector(".chk");
  if(chk) mapa.push({ id:li.getAttribute("data-id"), chk, li });
});
const contador = document.getElementById("contador");
const editando = document.getElementById("editando");

function atualizarContador(){
  const feitos = mapa.filter(e=>e.chk.checked).length;
  contador.textContent = feitos+" de "+TOTAL+" itens concluídos";
}

function renderDia(){
  const s = iso(selecionado);
  const o = readDay(s);
  mapa.forEach(e=>{
    e.chk.checked = !!o[e.id];
    e.li.classList.toggle("feito", e.chk.checked);
  });
  atualizarContador();
  if(s===hojeIso){
    editando.innerHTML = "<span>Você está marcando o dia de <b>hoje</b></span>";
  } else {
    editando.innerHTML = "<span>Você está vendo <b>"+selecionado.toLocaleDateString("pt-BR",{day:"numeric",month:"long"})+"</b></span>";
    const b = document.createElement("button");
    b.type="button"; b.textContent="ir para hoje";
    b.addEventListener("click",()=>{ selecionado=new Date(hoje); renderDia(); });
    editando.appendChild(b);
  }
}

function salvar(){
  if(!docRef) return;
  setDoc(docRef, { dias: estado.dias }).catch(e=>console.error("Erro ao salvar:", e));
}

mapa.forEach(e=>{
  e.chk.addEventListener("change",()=>{
    const s = iso(selecionado);
    if(!estado.dias[s]) estado.dias[s] = {};
    estado.dias[s][e.id] = e.chk.checked;
    e.li.classList.toggle("feito", e.chk.checked);
    atualizarContador();
    const feitos = mapa.filter(x=>x.chk.checked).length;
    if(e.chk.checked && feitos===TOTAL) comemorar();
    salvar();
  });
});

document.getElementById("limparDia").addEventListener("click",()=>{
  estado.dias[iso(selecionado)] = {};
  salvar(); renderDia();
});

const calTitulo = document.getElementById("calTitulo");
const calGrid = document.getElementById("calGrid");
const calResumo = document.getElementById("calResumo");

function renderMes(){
  calTitulo.textContent = MESES[mesView.m]+" de "+mesView.y;
  calGrid.innerHTML = "";
  DOW.forEach(d=>{
    const h=document.createElement("div"); h.className="cal-dow"; h.textContent=d; calGrid.appendChild(h);
  });
  const offset = new Date(mesView.y,mesView.m,1).getDay();
  const dias = new Date(mesView.y,mesView.m+1,0).getDate();
  for(let i=0;i<offset;i++){
    const v=document.createElement("div"); v.className="cal-cell cal-vazio"; calGrid.appendChild(v);
  }
  let completos=0;
  for(let d=1;d<=dias;d++){
    const s = iso(new Date(mesView.y,mesView.m,d));
    const cnt = doneCount(s);
    const ratio = cnt/TOTAL;
    if(cnt===TOTAL) completos++;
    const cell=document.createElement("div");
    cell.className="cal-cell";
    cell.dataset.iso=s;
    if(s===hojeIso) cell.classList.add("hoje");
    if(cnt===TOTAL){
      cell.classList.add("cheio");
      cell.style.background="linear-gradient(145deg,var(--roxo),var(--lilas))";
      cell.style.borderColor="var(--roxo)";
    } else if(cnt>0){
      cell.style.background="rgba(136,106,233,"+(0.15+0.5*ratio).toFixed(2)+")";
    }
    const num=document.createElement("span"); num.textContent=d;
    const frac=document.createElement("span"); frac.className="frac"; frac.textContent=cnt+"/"+TOTAL;
    cell.appendChild(num); cell.appendChild(frac);
    cell.addEventListener("click",()=>{ selecionado=parseIso(s); mostrar("hoje"); renderDia(); });
    calGrid.appendChild(cell);
  }
  calResumo.textContent = completos+(completos===1?" dia completo":" dias completos");
}

document.getElementById("mesAnterior").addEventListener("click",()=>{
  mesView.m--; if(mesView.m<0){ mesView.m=11; mesView.y--; } renderMes();
});
document.getElementById("mesProximo").addEventListener("click",()=>{
  mesView.m++; if(mesView.m>11){ mesView.m=0; mesView.y++; } renderMes();
});
document.getElementById("limparMes").addEventListener("click",()=>{
  if(!confirm("Limpar todas as marcações de "+MESES[mesView.m]+" de "+mesView.y+"?")) return;
  const pre = mesView.y+"-"+pad(mesView.m+1);
  Object.keys(estado.dias).forEach(k=>{ if(k.indexOf(pre)===0) delete estado.dias[k]; });
  salvar(); renderMes(); renderDia();
});

const tabHoje=document.getElementById("tabHoje");
const tabMes=document.getElementById("tabMes");
const viewHoje=document.getElementById("viewHoje");
const viewMes=document.getElementById("viewMes");
function mostrar(qual){
  const ehDia = qual==="hoje";
  tabHoje.classList.toggle("ativo",ehDia);
  tabMes.classList.toggle("ativo",!ehDia);
  viewHoje.classList.toggle("escondido",!ehDia);
  viewMes.classList.toggle("escondido",ehDia);
  if(!ehDia) renderMes();
}
tabHoje.addEventListener("click",()=>mostrar("hoje"));
tabMes.addEventListener("click",()=>mostrar("mes"));

renderDia();

// ----- comemoração -----
const canvas = document.getElementById("confete");
const ctx = canvas.getContext("2d");
const CORES = ["#480A80","#886AE9","#FE7443","#02B3C6","#FE31BC"];
let particulas = [];
let confeteRAF = null;

function ajustarCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
ajustarCanvas();
window.addEventListener("resize", ajustarCanvas);

function lancarConfete(){
  for(let i=0;i<150;i++){
    particulas.push({
      x: Math.random()*canvas.width,
      y: -20 - Math.random()*canvas.height*0.4,
      w: 6+Math.random()*7,
      h: 9+Math.random()*9,
      cor: CORES[Math.floor(Math.random()*CORES.length)],
      vx: -2.5+Math.random()*5,
      vy: 2+Math.random()*4.5,
      rot: Math.random()*Math.PI,
      vr: -0.25+Math.random()*0.5
    });
  }
  if(!confeteRAF) animarConfete();
}

function animarConfete(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particulas.forEach(p=>{
    p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.rot += p.vr;
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.cor;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  });
  particulas = particulas.filter(p=> p.y < canvas.height+40);
  if(particulas.length>0){
    confeteRAF = requestAnimationFrame(animarConfete);
  } else {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confeteRAF = null;
  }
}

function comemorar(){
  lancarConfete();
  const el = document.getElementById("parabens");
  el.classList.add("mostra");
  setTimeout(()=>{ el.classList.remove("mostra"); }, 3200);
}

// ----- Firebase -----
const overlay = document.getElementById("overlay");
const loginErro = document.getElementById("loginErro");
const loginMsg = document.getElementById("loginMsg");
const emailEl = document.getElementById("email");
const senhaEl = document.getElementById("senha");
const entrarBtn = document.getElementById("entrar");

function traduzErro(code){
  if(code==="auth/invalid-email") return "Email inválido.";
  if(code==="auth/too-many-requests") return "Muitas tentativas. Tente novamente mais tarde.";
  if(code==="auth/network-request-failed") return "Sem conexão. Verifique a internet.";
  if(["auth/invalid-credential","auth/wrong-password","auth/user-not-found"].includes(code)) return "Email ou senha incorretos.";
  return "Não foi possível entrar. Tente novamente.";
}

const configPronta = !String(firebaseConfig.apiKey).startsWith("SUA");

if(configPronta){
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = initializeFirestore(app, { localCache: persistentLocalCache() });
  setPersistence(auth, browserLocalPersistence).catch(()=>{});

  const entrar = () => {
    loginErro.textContent="";
    entrarBtn.disabled=true;
    signInWithEmailAndPassword(auth, emailEl.value.trim(), senhaEl.value)
      .catch(err=>{ loginErro.textContent=traduzErro(err.code); })
      .finally(()=>{ entrarBtn.disabled=false; });
  };
  entrarBtn.addEventListener("click", entrar);
  senhaEl.addEventListener("keydown", e=>{ if(e.key==="Enter") entrar(); });
  document.getElementById("sair").addEventListener("click",()=>{ signOut(auth); });

  onAuthStateChanged(auth, user=>{
    if(user){
      overlay.classList.add("escondido");
      docRef = doc(db, "usuarios", user.uid);
      onSnapshot(docRef, snap=>{
        estado.dias = (snap.exists() && snap.data().dias) ? snap.data().dias : {};
        renderDia();
        if(!viewMes.classList.contains("escondido")) renderMes();
      }, err=>console.error("Erro de leitura:", err));
    } else {
      overlay.classList.remove("escondido");
      docRef=null;
    }
  });
} else {
  loginMsg.textContent="Configure o Firebase no arquivo antes de usar.";
  loginErro.textContent="Cole o firebaseConfig no index.html, no lugar indicado.";
  entrarBtn.disabled=true;
}
</script>
