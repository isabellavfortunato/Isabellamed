<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sua rotina completa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --roxo:#480A80;
    --lilas:#886AE9;
    --laranja:#FE7443;
    --azul:#02B3C6;
    --rosa:#FE31BC;
    --fundo:#F7F4FC;
    --tinta-med:rgba(136,106,233,0.12);
    --borda-med:rgba(72,10,128,0.16);
    --texto-suave:#9C97B0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:
      radial-gradient(1200px 500px at 80% -10%, rgba(254,116,67,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(2,179,198,0.10), transparent 60%),
      var(--fundo);
    color:#2b2540;min-height:100vh;display:flex;justify-content:center;
    padding:32px 18px 56px;line-height:1.45;
  }
  .day{width:100%;max-width:520px;}
  header{margin-bottom:18px;}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--lilas);margin-bottom:8px;}
  h1{font-size:26px;font-weight:700;color:var(--roxo);letter-spacing:-0.01em;}
  .data{margin-top:6px;font-size:14px;font-weight:500;color:var(--laranja);text-transform:capitalize;}

  .tabs{display:flex;gap:6px;background:#fff;border:1px solid #ece7f6;border-radius:999px;padding:5px;margin-top:18px;box-shadow:0 6px 18px rgba(72,10,128,0.05);}
  .tab{flex:1;text-align:center;padding:9px;border-radius:999px;font-weight:600;font-size:13.5px;color:var(--texto-suave);cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .15s;}
  .tab.ativo{background:linear-gradient(135deg,var(--roxo),var(--lilas));color:#fff;}

  .legenda{display:flex;gap:18px;flex-wrap:wrap;margin-top:18px;font-size:12.5px;color:#6b6680;}
  .legenda span{display:flex;align-items:center;gap:8px;}
  .dot-cheia{width:13px;height:13px;border-radius:50%;background:linear-gradient(145deg,var(--roxo),var(--lilas));}
  .dot-vazia{width:13px;height:13px;border-radius:50%;background:#fff;border:2px solid #d7d1e6;}

  .barra{margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid #ece7f6;border-radius:14px;padding:12px 15px;box-shadow:0 6px 18px rgba(72,10,128,0.05);}
  .barra .texto{font-size:13.5px;font-weight:500;color:var(--roxo);}
  .barra button{border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--lilas);background:rgba(136,106,233,0.12);padding:7px 13px;border-radius:999px;transition:background .15s;}
  .barra button:hover{background:rgba(136,106,233,0.22);}

  .editando{margin-top:12px;font-size:13px;color:#6b6680;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .editando b{color:var(--roxo);text-transform:capitalize;font-weight:600;}
  .editando button{border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--laranja);background:rgba(254,116,67,0.12);padding:5px 11px;border-radius:999px;}

  .timeline{position:relative;list-style:none;margin-top:22px;padding-left:34px;}
  .timeline::before{content:"";position:absolute;left:11px;top:6px;bottom:6px;width:3px;border-radius:3px;background:linear-gradient(to bottom,var(--laranja) 0%,var(--rosa) 30%,var(--lilas) 55%,var(--roxo) 78%,var(--azul) 100%);opacity:0.55;}
  .entry{position:relative;margin-bottom:14px;}
  .node{position:absolute;left:-29px;top:18px;width:18px;height:18px;border-radius:50%;z-index:1;}
  .med .node{background:linear-gradient(145deg,var(--roxo),var(--lilas));box-shadow:0 0 0 4px var(--fundo),0 4px 10px rgba(72,10,128,0.35);}
  .leve .node{background:#fff;border:3px solid #d7d1e6;box-shadow:0 0 0 4px var(--fundo);}
  .card{border-radius:16px;padding:14px 16px;display:flex;align-items:flex-start;gap:13px;width:100%;text-align:left;}
  label.card{cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .med .card{background:var(--tinta-med);border:1px solid var(--borda-med);}
  .leve .card{background:rgba(72,10,128,0.035);border:1px dashed rgba(72,10,128,0.14);}
  .chk{position:absolute;opacity:0;pointer-events:none;}
  .box{flex:0 0 auto;width:22px;height:22px;border-radius:7px;margin-top:1px;border:2px solid var(--lilas);background:#fff;position:relative;transition:all .15s;}
  .leve .box{border-color:#c9c2de;}
  .box::after{content:"";position:absolute;left:6px;top:2px;width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg) scale(0);transition:transform .15s;}
  .chk:checked + .box{background:linear-gradient(145deg,var(--roxo),var(--lilas));border-color:var(--roxo);}
  .leve .chk:checked + .box{background:linear-gradient(145deg,var(--azul),var(--lilas));border-color:var(--azul);}
  .chk:checked + .box::after{transform:rotate(45deg) scale(1);}
  .chk:focus-visible + .box{outline:3px solid rgba(136,106,233,0.5);outline-offset:2px;}
  .hora{flex:0 0 auto;font-size:13px;font-weight:600;padding:6px 11px;border-radius:999px;white-space:nowrap;line-height:1.1;margin-top:1px;}
  .med .hora{background:linear-gradient(135deg,var(--roxo),var(--lilas));color:#fff;}
  .leve .hora{background:transparent;color:var(--texto-suave);border:1px solid #ddd7ea;}
  .conteudo{padding-top:2px;}
  .item{font-size:15.5px;font-weight:600;color:#2b2540;transition:opacity .15s;}
  .leve .item{font-weight:500;color:var(--texto-suave);}
  .nota{margin-top:3px;font-size:12.5px;font-weight:400;color:#7c7791;}
  .entry.feito .item{opacity:.45;text-decoration:line-through;}
  .entry.feito .nota{opacity:.5;}
  .marcador .card{padding-left:16px;}

  /* mês */
  #viewMes{margin-top:22px;}
  .cal-topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-titulo{font-size:17px;font-weight:600;color:var(--roxo);text-transform:capitalize;}
  .cal-nav{display:flex;gap:8px;}
  .cal-nav button{width:36px;height:36px;border-radius:10px;border:1px solid #ece7f6;background:#fff;color:var(--roxo);font-size:18px;cursor:pointer;font-family:inherit;line-height:1;}
  .cal-nav button:hover{background:#f1ecfb;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{font-size:11px;text-align:center;color:var(--texto-suave);font-weight:600;text-transform:capitalize;padding-bottom:2px;}
  .cal-cell{aspect-ratio:1/1;border-radius:12px;border:1px solid #ece7f6;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#2b2540;cursor:pointer;background:#fff;}
  .cal-cell .frac{font-size:9.5px;font-weight:500;color:var(--texto-suave);margin-top:1px;}
  .cal-cell.cheio{color:#fff;}
  .cal-cell.cheio .frac{color:rgba(255,255,255,0.85);}
  .cal-cell.hoje{box-shadow:0 0 0 2px var(--laranja);}
  .cal-vazio{background:transparent;border:none;cursor:default;}
  .cal-resumo{margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid #ece7f6;border-radius:14px;padding:12px 15px;box-shadow:0 6px 18px rgba(72,10,128,0.05);}
  .cal-resumo .texto{font-size:13.5px;font-weight:500;color:var(--roxo);}
  .cal-resumo button{border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--laranja),var(--rosa));padding:8px 14px;border-radius:999px;}
  .escondido{display:none !important;}

  footer{margin-top:30px;font-size:11.5px;color:var(--texto-suave);text-align:center;}
  @media print{body{background:#fff;}.timeline::before{opacity:1;}.barra button,.cal-resumo button,.cal-nav{display:none;}}
</style>
</head>
<body>
  <main class="day">
    <header>
      <div class="eyebrow">rotina do dia</div>
      <h1>Sua rotina completa</h1>
      <p class="data" id="dataHoje"></p>
      <div class="tabs">
        <button class="tab ativo" id="tabHoje" type="button">Dia</button>
        <button class="tab" id="tabMes" type="button">Mês</button>
      </div>
    </header>

    <!-- VISÃO DO DIA -->
    <section id="viewHoje">
      <div class="legenda">
        <span><i class="dot-cheia"></i>medicação</span>
        <span><i class="dot-vazia"></i>suplemento e descanso</span>
      </div>
      <div class="barra">
        <span class="texto" id="contador">0 de 6 itens concluídos</span>
        <button id="limparDia" type="button">limpar dia</button>
      </div>
      <div class="editando" id="editando"></div>

      <ol class="timeline" id="lista">
        <li class="entry leve" data-id="suplemento">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">8:00 às 9:00</span>
            <span class="conteudo">
              <span class="item">Guaraná, maca peruana e ginseng</span>
              <span class="nota">em iogurte, ajuda a combater o sono diurno</span>
            </span>
          </label>
        </li>
        <li class="entry med" data-id="lurasidona">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">12:00</span>
            <span class="conteudo">
              <span class="item">Lurasidona 40 mg</span>
              <span class="nota">com o almoço</span>
            </span>
          </label>
        </li>
        <li class="entry med" data-id="lamitor">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">18:00</span>
            <span class="conteudo"><span class="item">Lamitor 200 mg</span></span>
          </label>
        </li>
        <li class="entry med" data-id="litio-20">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">20:00</span>
            <span class="conteudo"><span class="item">Lítio 450 mg</span></span>
          </label>
        </li>
        <li class="entry med" data-id="quetiapina">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">21:00</span>
            <span class="conteudo">
              <span class="item">Quetiapina XR 50 mg e Alprazolam</span>
              <span class="nota">alprazolam só se necessário</span>
            </span>
          </label>
        </li>
        <li class="entry leve marcador" data-id="dormir-marcador">
          <span class="node"></span>
          <div class="card">
            <span class="hora">22:00</span>
            <span class="conteudo"><span class="item">Dormir</span></span>
          </div>
        </li>
        <li class="entry med" data-id="litio-23">
          <span class="node"></span>
          <label class="card">
            <input type="checkbox" class="chk"><span class="box"></span>
            <span class="hora">23:00</span>
            <span class="conteudo">
              <span class="item">Lítio 450 mg</span>
              <span class="nota">segunda metade</span>
            </span>
          </label>
        </li>
        <li class="entry leve marcador" data-id="acordar-marcador">
          <span class="node"></span>
          <div class="card">
            <span class="hora">6:00 às 7:00</span>
            <span class="conteudo"><span class="item">Acordar</span></span>
          </div>
        </li>
      </ol>
    </section>

    <!-- VISÃO DO MÊS -->
    <section id="viewMes" class="escondido">
      <div class="cal-topo">
        <span class="cal-titulo" id="calTitulo"></span>
        <div class="cal-nav">
          <button id="mesAnterior" type="button" aria-label="mês anterior">‹</button>
          <button id="mesProximo" type="button" aria-label="próximo mês">›</button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-resumo">
        <span class="texto" id="calResumo">0 dias completos</span>
        <button id="limparMes" type="button">limpar mês</button>
      </div>
    </section>

    <footer>organizado com carinho para a sua rotina diária</footer>
  </main>

<script>
(function(){
  var TICK = ["suplemento","lurasidona","lamitor","litio-20","quetiapina","litio-23"];
  var TOTAL = TICK.length;
  var MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
  var DOW = ["dom","seg","ter","qua","qui","sex","sáb"];

  function pad(n){return String(n).padStart(2,"0");}
  function iso(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
  function parseIso(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
  function keyFor(s){return "rotina-"+s;}
  function readDay(s){try{return JSON.parse(localStorage.getItem(keyFor(s)))||{};}catch(e){return {};}}
  function saveDay(s,o){try{localStorage.setItem(keyFor(s),JSON.stringify(o));}catch(e){}}
  function doneCount(s){var o=readDay(s),n=0;TICK.forEach(function(id){if(o[id])n++;});return n;}
  function porExtenso(d){return d.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}

  var hoje=new Date();hoje.setHours(0,0,0,0);
  var hojeIso=iso(hoje);
  var selecionado=new Date(hoje);
  var mesView={y:hoje.getFullYear(),m:hoje.getMonth()};

  document.getElementById("dataHoje").textContent=porExtenso(hoje);

  var checks=Array.prototype.slice.call(document.querySelectorAll(".entry[data-id] .chk"))
    .filter(function(c){return c;});
  var mapa=[];
  document.querySelectorAll(".entry[data-id]").forEach(function(li){
    var chk=li.querySelector(".chk");
    if(chk) mapa.push({id:li.getAttribute("data-id"),chk:chk,li:li});
  });

  var contador=document.getElementById("contador");
  var editando=document.getElementById("editando");

  function renderDia(){
    var s=iso(selecionado);
    var o=readDay(s);
    mapa.forEach(function(e){
      e.chk.checked=!!o[e.id];
      e.li.classList.toggle("feito",e.chk.checked);
    });
    var feitos=mapa.filter(function(e){return e.chk.checked;}).length;
    contador.textContent=feitos+" de "+TOTAL+" itens concluídos";
    if(s===hojeIso){
      editando.innerHTML='<span>Você está marcando o dia de <b>hoje</b></span>';
    }else{
      editando.innerHTML='<span>Você está vendo <b>'+selecionado.toLocaleDateString("pt-BR",{day:"numeric",month:"long"})+'</b></span>';
      var b=document.createElement("button");b.type="button";b.textContent="ir para hoje";
      b.addEventListener("click",function(){selecionado=new Date(hoje);renderDia();});
      editando.appendChild(b);
    }
  }

  mapa.forEach(function(e){
    e.chk.addEventListener("change",function(){
      var s=iso(selecionado);var o=readDay(s);
      o[e.id]=e.chk.checked;saveDay(s,o);
      e.li.classList.toggle("feito",e.chk.checked);
      var feitos=mapa.filter(function(x){return x.chk.checked;}).length;
      contador.textContent=feitos+" de "+TOTAL+" itens concluídos";
    });
  });

  document.getElementById("limparDia").addEventListener("click",function(){
    var s=iso(selecionado);saveDay(s,{});renderDia();
  });

  // calendário
  var calTitulo=document.getElementById("calTitulo");
  var calGrid=document.getElementById("calGrid");
  var calResumo=document.getElementById("calResumo");

  function renderMes(){
    calTitulo.textContent=MESES[mesView.m]+" de "+mesView.y;
    calGrid.innerHTML="";
    DOW.forEach(function(d){
      var h=document.createElement("div");h.className="cal-dow";h.textContent=d;calGrid.appendChild(h);
    });
    var primeiro=new Date(mesView.y,mesView.m,1);
    var offset=primeiro.getDay();
    var dias=new Date(mesView.y,mesView.m+1,0).getDate();
    for(var i=0;i<offset;i++){
      var v=document.createElement("div");v.className="cal-cell cal-vazio";calGrid.appendChild(v);
    }
    var completos=0;
    for(var d=1;d<=dias;d++){
      var data=new Date(mesView.y,mesView.m,d);
      var s=iso(data);
      var cnt=doneCount(s);
      var ratio=cnt/TOTAL;
      if(cnt===TOTAL)completos++;
      var cell=document.createElement("div");
      cell.className="cal-cell";
      cell.setAttribute("data-iso",s);
      if(s===hojeIso)cell.classList.add("hoje");
      if(cnt===TOTAL){
        cell.classList.add("cheio");
        cell.style.background="linear-gradient(145deg,var(--roxo),var(--lilas))";
        cell.style.borderColor="var(--roxo)";
      }else if(cnt>0){
        cell.style.background="rgba(136,106,233,"+(0.15+0.5*ratio).toFixed(2)+")";
      }
      var num=document.createElement("span");num.textContent=d;
      var frac=document.createElement("span");frac.className="frac";frac.textContent=cnt+"/"+TOTAL;
      cell.appendChild(num);cell.appendChild(frac);
      cell.addEventListener("click",function(){
        selecionado=parseIso(this.getAttribute("data-iso"));
        mostrar("hoje");renderDia();
      });
      calGrid.appendChild(cell);
    }
    calResumo.textContent=completos+(completos===1?" dia completo":" dias completos");
  }

  document.getElementById("mesAnterior").addEventListener("click",function(){
    mesView.m--;if(mesView.m<0){mesView.m=11;mesView.y--;}renderMes();
  });
  document.getElementById("mesProximo").addEventListener("click",function(){
    mesView.m++;if(mesView.m>11){mesView.m=0;mesView.y++;}renderMes();
  });
  document.getElementById("limparMes").addEventListener("click",function(){
    if(!confirm("Limpar todas as marcações de "+MESES[mesView.m]+" de "+mesView.y+"?"))return;
    var prefixo="rotina-"+mesView.y+"-"+pad(mesView.m+1);
    var remover=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.indexOf(prefixo)===0)remover.push(k);
    }
    remover.forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});
    renderMes();renderDia();
  });

  // abas
  var tabHoje=document.getElementById("tabHoje");
  var tabMes=document.getElementById("tabMes");
  var viewHoje=document.getElementById("viewHoje");
  var viewMes=document.getElementById("viewMes");
  function mostrar(qual){
    var ehDia=(qual==="hoje");
    tabHoje.classList.toggle("ativo",ehDia);
    tabMes.classList.toggle("ativo",!ehDia);
    viewHoje.classList.toggle("escondido",!ehDia);
    viewMes.classList.toggle("escondido",ehDia);
    if(!ehDia)renderMes();
  }
  tabHoje.addEventListener("click",function(){mostrar("hoje");});
  tabMes.addEventListener("click",function(){mostrar("mes");});

  renderDia();
})();
</script>
</body>
</html>
